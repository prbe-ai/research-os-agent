name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The floor and the current release: `requires-python = ">=3.11"`.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      # tests/test_parity.py is the contract guard: it fails when a backend route in
      # schema/openapi.json has no client call site (or when the allowlists go stale).
      - run: pytest -q
      # probe-research-tap plugin tests (stdlib-only; own pyproject, so the root
      # pytest run does not collect them — see also `make test-tap`).
      - run: pytest -q plugins/probe-research-tap/tests
