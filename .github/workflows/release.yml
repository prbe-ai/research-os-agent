name: Release

# Releases the CLI (probe-research on PyPI) and/or the plugin (plugin.json on the
# marketplace). Two ways in:
#
#   1. push a tag `v*`      — the original immutable-tag CLI release. A tag is the
#                             thing users pin; publishing `@main` would make "which
#                             build am I running" unanswerable.
#   2. workflow_dispatch     — one-command release from chat/CLI. Give a CLI `version`
#                             and/or a `plugin_version`; this bumps the right files
#                             (pyproject / plugin.json + the client-version nudge
#                             manifest), commits + tags on main, and — for a CLI
#                             release — builds and publishes to PyPI. Self-contained on
#                             purpose: a tag pushed by this workflow's GITHUB_TOKEN does
#                             NOT start a new `on: push tags` run (GitHub's recursion
#                             guard), so the dispatch run must do its own build+publish.
#
# CLI and plugin version INDEPENDENTLY — they are separate inputs. A plugin release is
# just a version bump on main (the marketplace serves plugin.json from main); it never
# touches PyPI, so the build/publish steps are skipped for a plugin-only release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "CLI (probe-research) version to release, no leading v (e.g. 0.7.2). Blank = no CLI release."
        required: false
        type: string
        default: ""
      plugin_version:
        description: "Plugin version to release — bumps plugin.json + client-version.json plugin.latest. Blank = no plugin release."
        required: false
        type: string
        default: ""
      bump_manifest:
        description: "For a CLI release, also set client-version.json cli.latest to this version"
        type: boolean
        default: true
      dry_run:
        description: "Build/bump locally; skip the commit, tag, push, and PyPI publish"
        type: boolean
        default: false

concurrency: release # never two releases racing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # the dispatch path pushes the release commit + tag(s); the tag path ignores it
    steps:
      - uses: actions/checkout@v4
        with:
          # dispatch releases from main; a tag build checks out the tag that triggered it
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --- dispatch path only: bump -> commit -> tag on main. Handles a CLI release,
      #     a plugin release, or both in one commit. On a tag push this step is skipped. ---
      - name: Bump, commit, and tag (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          VERSION: ${{ inputs.version }}
          PLUGIN_VERSION: ${{ inputs.plugin_version }}
          BUMP_MANIFEST: ${{ inputs.bump_manifest }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ] && [ -z "$PLUGIN_VERSION" ]; then
            echo "::error::provide 'version' (CLI release) and/or 'plugin_version' (plugin release)"; exit 1
          fi
          semver() {
            echo "$1" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
              || { echo "::error::$2 must be MAJOR.MINOR.PATCH, got '$1'"; exit 1; }
          }
          TAGS=""
          if [ -n "$VERSION" ]; then
            semver "$VERSION" "version"
            if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
              echo "::error::tag v$VERSION already exists"; exit 1
            fi
            if curl -sf "https://pypi.org/pypi/probe-research/$VERSION/json" >/dev/null 2>&1; then
              echo "::error::probe-research $VERSION is already on PyPI"; exit 1
            fi
            TAGS="$TAGS v$VERSION"
          fi
          if [ -n "$PLUGIN_VERSION" ]; then
            semver "$PLUGIN_VERSION" "plugin_version"
            if git rev-parse -q --verify "refs/tags/probe-research--v$PLUGIN_VERSION" >/dev/null; then
              echo "::error::tag probe-research--v$PLUGIN_VERSION already exists"; exit 1
            fi
            TAGS="$TAGS probe-research--v$PLUGIN_VERSION"
          fi
          # Bump whichever versions were given, format-preserving (regex, so JSON/TOML
          # layout + comments survive). One python pass drives both.
          python - <<'PY'
          import os, re, pathlib
          def sub(path, pattern, value, label):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"::warning::{path} not found; skipped {label}"); return
              text = p.read_text()
              new, n = re.subn(pattern, lambda m: m.group(1) + value + m.group(2), text, count=1)
              if n != 1:
                  raise SystemExit(f"::error::{label}: pattern not found in {path}")
              p.write_text(new)
          v = os.environ.get("VERSION") or ""
          pv = os.environ.get("PLUGIN_VERSION") or ""
          if v:
              sub("pyproject.toml", r'(?m)^(version = ")[^"]+(")', v, "pyproject version")
              if os.environ.get("BUMP_MANIFEST") == "true":
                  sub("client-version.json",
                      r'("cli"\s*:\s*\{[^}]*?"latest"\s*:\s*")[^"]*(")', v, "manifest cli.latest")
          if pv:
              sub("plugins/probe-research/.claude-plugin/plugin.json",
                  r'("version"\s*:\s*")[^"]*(")', pv, "plugin.json version")
              sub("client-version.json",
                  r'("plugin"\s*:\s*\{[^}]*?"latest"\s*:\s*")[^"]*(")', pv, "manifest plugin.latest")
          PY
          if [ -n "$VERSION" ] && [ -n "$PLUGIN_VERSION" ]; then
            MSG="chore: release cli v$VERSION + plugin $PLUGIN_VERSION"
          elif [ -n "$VERSION" ]; then
            MSG="chore: release v$VERSION"
          else
            MSG="chore(plugin): bump probe-research $PLUGIN_VERSION"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml client-version.json plugins/probe-research/.claude-plugin/plugin.json
          git commit -m "$MSG"
          for t in $TAGS; do git tag -a "$t" -m "$t"; done
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY_RUN: created commit + tag(s) [$TAGS] locally, not pushing."
          else
            git push origin HEAD:main
            for t in $TAGS; do git push origin "$t"; done
          fi

      # Everything below is the CLI/PyPI publish path. It runs on a tag push or a CLI
      # dispatch (inputs.version set); a plugin-only release skips it entirely.

      # The tag is the release's identity: if it disagrees with the version the build
      # would publish, stop. Publishing v0.6.0 from a tree that says 0.5.0 puts a
      # permanently wrong version on PyPI, and PyPI will not let you reuse the number.
      # (On the dispatch path the tag was just created from this same version, so it
      # matches by construction — the check still guards a hand-edited mismatch.)
      - name: Tag must match the packaged version
        if: ${{ github.event_name == 'push' || inputs.version != '' }}
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$DISPATCH_VERSION"
          else
            tag="${GITHUB_REF_NAME#v}"
          fi
          pkg="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag implies that version, but pyproject says $pkg"
            exit 1
          fi
          echo "releasing $pkg"
      - if: ${{ github.event_name == 'push' || inputs.version != '' }}
        run: pip install -e ".[dev]"
      - if: ${{ github.event_name == 'push' || inputs.version != '' }}
        run: pytest -q # gate: never publish a red tree
      - if: ${{ github.event_name == 'push' || inputs.version != '' }}
        run: pip install build && python -m build
      - if: ${{ github.event_name == 'push' || inputs.version != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Publish to PyPI only for a CLI release (tag push or dispatch with a version), and
    # never on a dry run. A plugin-only release has nothing to publish.
    if: ${{ (github.event_name == 'push' || inputs.version != '') && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    # `environment: pypi` scopes OIDC trusted publishing. NOTE: it has no required
    # reviewer configured, so this is NOT a human-approval gate today — a dispatch or
    # a tag publishes straight through. Add a required reviewer in the environment
    # settings if you want a manual approve before each PyPI upload.
    environment: pypi
    permissions:
      id-token: write # PyPI trusted publishing (OIDC); no long-lived token in secrets
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
